apiVersion: naftiko.dev/v1
kind: SharedCapability
metadata:
  name: chop-fhir-r4
  provider: childrens-hospital-of-philadelphia
  api: chop-fhir-r4
  description: Read-only access to clinical and provider-directory resources exposed by the Children's Hospital of Philadelphia FHIR R4 endpoint.
spec:
  baseUrl: https://epicnsproxy.chop.edu/fhir/api/FHIR/R4
  auth:
    type: oauth2-smart
    authorizationUrl: https://epicnsproxy.chop.edu/fhir/oauth2/authorize
    tokenUrl: https://epicnsproxy.chop.edu/fhir/oauth2/token
    scopes:
      - launch
      - openid
      - fhirUser
      - profile
      - offline_access
  capabilities:
    - id: chop.patient.read
      operationId: readPatient
      description: Read a Patient resource by id.
    - id: chop.patient.search
      operationId: searchPatient
      description: Search Patient resources by demographics or identifier.
    - id: chop.condition.search
      operationId: searchCondition
      description: Search Conditions for a patient (problems, encounter-diagnosis).
    - id: chop.observation.search
      operationId: searchObservation
      description: Search Observations (vitals, labs, social-history).
    - id: chop.medication.search
      operationId: searchMedicationRequest
      description: Search MedicationRequest orders for a patient.
    - id: chop.immunization.search
      operationId: searchImmunization
      description: Search Immunization history for a patient.
    - id: chop.allergy.search
      operationId: searchAllergyIntolerance
      description: Search AllergyIntolerance entries for a patient.
    - id: chop.encounter.search
      operationId: searchEncounter
      description: Search Encounters for a patient.
    - id: chop.procedure.search
      operationId: searchProcedure
      description: Search Procedures performed for a patient.
    - id: chop.report.search
      operationId: searchDiagnosticReport
      description: Search DiagnosticReports (labs, imaging) for a patient.
    - id: chop.document.search
      operationId: searchDocumentReference
      description: Search DocumentReference notes for a patient.
    - id: chop.coverage.search
      operationId: searchCoverage
      description: Search Coverage resources for a patient (insurance).
    - id: chop.eob.search
      operationId: searchExplanationOfBenefit
      description: Search ExplanationOfBenefit (EOB) records.
    - id: chop.claim.search
      operationId: searchClaim
      description: Search Claim records for a patient.
    - id: chop.practitioner.search
      operationId: searchPractitioner
      description: Public Provider Directory practitioner search.
    - id: chop.practitionerRole.search
      operationId: searchPractitionerRole
      description: Public Provider Directory practitioner role search.
    - id: chop.organization.search
      operationId: searchOrganization
      description: Public Provider Directory organization search.
    - id: chop.location.search
      operationId: searchLocation
      description: Public Provider Directory location search.
    - id: chop.endpoint.search
      operationId: searchEndpoint
      description: Public Provider Directory endpoint search.
    - id: chop.bulk.export
      operationId: exportGroup
      description: Initiate Group-level Bulk Data ($export) for population analytics.
