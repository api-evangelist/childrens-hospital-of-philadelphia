apis:
  - name: CHOP FHIR R4 API
    description: |
      The Children's Hospital of Philadelphia FHIR Server. Epic (November 2025) on the back end,
      conforming to US Core 6.1.0 and the HL7 Bulk Data Access IG. Serves Patient Access (clinical + claims)
      and Provider Directory data per CMS-9115-F, exposing 59 FHIR resource types including Patient,
      AllergyIntolerance, Condition, Observation, MedicationRequest, Immunization, Procedure, Encounter,
      DiagnosticReport, DocumentReference, Coverage, ExplanationOfBenefit, Claim, Practitioner,
      PractitionerRole, Organization, Location, and Endpoint.
    humanURL: https://www.chop.edu/health-resources/cms-interoperability-and-patient-access
    baseURL: https://epicnsproxy.chop.edu/fhir/api/FHIR/R4
    tags:
      - FHIR
      - SMART On FHIR
      - Patient Access
      - Provider Directory
      - Bulk Data
      - US Core
    properties:
      - type: Documentation
        url: https://www.chop.edu/health-resources/cms-interoperability-and-patient-access
      - type: APIReference
        url: https://epicnsproxy.chop.edu/fhir/api/FHIR/R4/metadata
      - type: OpenAPI
        url: openapi/chop-fhir-r4-openapi.yml
      - type: JSONSchema
        url: json-schema/chop-fhir-patient-schema.json
      - type: JSONSchema
        url: json-schema/chop-fhir-organization-schema.json
      - type: JSONSchema
        url: json-schema/chop-fhir-practitioner-schema.json
      - type: JSONSchema
        url: json-schema/chop-fhir-observation-schema.json
      - type: Example
