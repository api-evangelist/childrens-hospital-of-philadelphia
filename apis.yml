name: Children's Hospital of Philadelphia
description: >
  Founded in 1855 as the first hospital in the United States dedicated to the healthcare of children, Children's
  Hospital of Philadelphia (CHOP) is a 692-bed flagship pediatric academic medical center affiliated with the University
  of Pennsylvania Perelman School of Medicine. CHOP records roughly 1.63 million outpatient visits and 34,829 admissions
  per year and operates one of the largest pediatric research enterprises in the world through its Research Institute
  and the Center for Data Driven Discovery in Biomedicine (D3b).


  From an API perspective, CHOP runs a production Epic-backed HL7 FHIR R4 endpoint at
  `https://epicnsproxy.chop.edu/fhir/api/FHIR/R4` exposing CMS-9115-F Patient Access and Provider Directory resources,
  US Core 6.1.0, SMART on FHIR, and HL7 Bulk Data. CHOP additionally publishes 320+ public repositories across the
  `chop-dbhi` (Department of Biomedical and Health Informatics) and `d3b-center` GitHub organizations, plus shared
  research data platforms including RADIANT, CAVATICA, PedcBioPortal, the Children's Brain Tumor Network, and the Kids
  First Data Resource Center.
