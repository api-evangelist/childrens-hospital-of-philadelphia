      - type: GitHubRepository
        url: https://github.com/chop-dbhi/dataexpress
      - type: GitHubRepository
        url: https://github.com/chop-dbhi/dicom-anon
      - type: GitHubRepository
        url: https://github.com/chop-dbhi/smart-asthma
      - type: GitHubRepository
        url: https://github.com/chop-dbhi/avocado
